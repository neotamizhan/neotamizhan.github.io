---
layout: default
---
<article class="wrap article">
  <a class="backlink" href="{{ '/#writing' | relative_url }}">← index</a>
  <div class="post-meta">
    <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%Y.%m.%d" }}</time>
    {%- if page.tags and page.tags != empty -%}
      &nbsp;·&nbsp; {{ page.tags | join: " / " }}
    {%- endif -%}
  </div>
  <h1>{{ page.title }}</h1>

  <div class="article-body">
    {{ content }}
  </div>
</article>
